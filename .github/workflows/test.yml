name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets --all-features -- -D warnings

  providers:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        package:
          - vcs-provider-github
          - vcs-provider-gitlab
          - vcs-provider-bitbucket
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt
      - run: cargo test --package ${{ matrix.package }}
      - run: cargo clippy --package ${{ matrix.package }} --all-targets --all-features -- -D warnings
