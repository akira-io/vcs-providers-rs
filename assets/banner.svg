<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="git-cognition">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d3fe0"/>
      <stop offset="100%" stop-color="#7c5cf0"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13131e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <style>
      .title { font: 800 88px ui-sans-serif, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .subtitle { font: 400 36px ui-sans-serif, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #e8e5ff; text-anchor: middle; }
      .node { fill: #6c5ce7; }
      .edge { stroke: #6c5ce7; stroke-width: 14; fill: none; stroke-linecap: round; }
      .wordmark { font: 800 110px ui-sans-serif, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #6c5ce7; text-anchor: middle; letter-spacing: -2px; }
    </style>
  </defs>

  <rect width="1280" height="280" fill="url(#purple)"/>
  <text class="title" x="640" y="140">Git Cognition</text>
  <text class="subtitle" x="640" y="210">A VCS Provider &amp; Local Git Tool for Rust</text>

  <rect y="280" width="1280" height="440" fill="url(#dark)"/>

  <ellipse cx="640" cy="470" rx="320" ry="200" fill="url(#glow)"/>

  <g transform="translate(640, 470)">
    <line class="edge" x1="-40" y1="-110" x2="-40" y2="110"/>
    <path class="edge" d="M -40 -50 C 30 -30 70 0 70 30 C 70 60 30 90 -40 70"/>
    <circle class="node" cx="-40" cy="-110" r="22"/>
    <circle class="node" cx="-40" cy="-50" r="22"/>
    <circle class="node" cx="-40" cy="70" r="22"/>
    <circle class="node" cx="-40" cy="110" r="22"/>
    <circle class="node" cx="70" cy="30" r="22"/>
  </g>

  <text class="wordmark" x="640" y="660">git-cognition</text>
</svg>
